name: Lighthouse CI

on:
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - '.editorconfig'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Shopify Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Shopify Lighthouse CI
        uses: shopify/lighthouse-ci-action@v1
        with:
          store: ${{ secrets.SHOPIFY_STORE }}
          client_id: ${{ secrets.SHOPIFY_CLIENT_ID }}
          client_secret: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          password: ${{ secrets.SHOPIFY_STORE_PASSWORD }}
          pull_theme: ${{ secrets.SHOPIFY_THEME_ID_DEV }}
          lhci_github_app_token: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          lhci_min_score_performance: '0.9'
          lhci_min_score_accessibility: '0.95'
