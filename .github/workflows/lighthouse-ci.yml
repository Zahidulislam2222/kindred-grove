name: Lighthouse CI

on:
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - '.editorconfig'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Shopify Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Preflight — check Lighthouse secrets
        id: preflight
        env:
          STORE: ${{ secrets.SHOPIFY_STORE }}
          CID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          CSEC: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: |
          if [ -z "$STORE" ] || [ -z "$CID" ] || [ -z "$CSEC" ]; then
            {
              echo "### Lighthouse CI skipped — secrets not provisioned"
              echo ""
              echo "SHOPIFY_STORE / SHOPIFY_CLIENT_ID / SHOPIFY_CLIENT_SECRET required. See \`docs/CI-SECRETS.md\` for the Dev Dashboard app mint steps."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Lighthouse CI skipped — required secrets missing."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Run Shopify Lighthouse CI
        if: steps.preflight.outputs.skip != 'true'
        uses: shopify/lighthouse-ci-action@v1
        with:
          store: ${{ secrets.SHOPIFY_STORE }}
          client_id: ${{ secrets.SHOPIFY_CLIENT_ID }}
          client_secret: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          password: ${{ secrets.SHOPIFY_STORE_PASSWORD }}
          pull_theme: ${{ secrets.SHOPIFY_THEME_ID_DEV }}
          lhci_github_app_token: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          lhci_min_score_performance: '0.9'
          lhci_min_score_accessibility: '0.95'
