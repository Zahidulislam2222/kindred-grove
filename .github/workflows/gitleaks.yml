name: Gitleaks — secret scan

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Every Monday 06:00 UTC — catches dormant leaks

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for push + scheduled, shallow for PR)
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Our config — custom allowlist for known placeholders
          GITLEAKS_CONFIG: .gitleaks.toml
