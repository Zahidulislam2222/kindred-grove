name: Deploy — Production theme

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Push to production (live) theme
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Requires a GitHub Environment named "production" with required reviewers
    # configured in repo Settings → Environments → production. That setting is
    # what enforces human approval on every deploy, not a workflow input.
    environment: production

    steps:
      - name: Preflight — check deploy secrets
        id: preflight
        env:
          TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          STORE: ${{ secrets.SHOPIFY_STORE }}
          THEME: ${{ secrets.SHOPIFY_THEME_ID_PRODUCTION }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$STORE" ] || [ -z "$THEME" ]; then
            {
              echo "### Deploy skipped — secrets not provisioned"
              echo ""
              echo "One or more of SHOPIFY_CLI_THEME_TOKEN / SHOPIFY_STORE / SHOPIFY_THEME_ID_PRODUCTION is empty."
              echo ""
              echo "This is expected during initial setup. See \`docs/CI-SECRETS.md\` for the mint steps."
              echo "When the secrets are added, the next push to \`main\` will deploy normally — no code change needed."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Production deploy skipped — required secrets missing. See docs/CI-SECRETS.md."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Shopify CLI
        if: steps.preflight.outputs.skip != 'true'
        run: npm install -g @shopify/cli@latest

      - name: Theme check (fail fast)
        if: steps.preflight.outputs.skip != 'true'
        run: shopify theme check --fail-level=error

      - name: Push to production theme (live)
        if: steps.preflight.outputs.skip != 'true'
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_FLAG_FORCE: '1'
        run: |
          shopify theme push \
            --json \
            --allow-live \
            --theme ${{ secrets.SHOPIFY_THEME_ID_PRODUCTION }} \
            --store "$SHOPIFY_FLAG_STORE" \
            --password "$SHOPIFY_CLI_THEME_TOKEN"
